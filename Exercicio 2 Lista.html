<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor Dinâmico</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 320px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .campo {
      margin-bottom: 20px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Conversor de Temperatura</h1>

    <div class="campo">
      <label for="celsius">Celsius (°C)</label>
      <input type="number" id="celsius" step="0.1" placeholder="Digite em Celsius">
    </div>

    <div class="campo">
      <label for="fahrenheit">Fahrenheit (°F)</label>
      <input type="number" id="fahrenheit" step="0.1" placeholder="Digite em Fahrenheit">
    </div>
  </div>

  <script>
    const celsiusInput = document.getElementById("celsius");
    const fahrenheitInput = document.getElementById("fahrenheit");

  
    celsiusInput.addEventListener("input", () => {
      const celsius = parseFloat(celsiusInput.value);

      if (isNaN(celsius)) {
        fahrenheitInput.value = "";
        return;
      }

      const fahrenheit = (celsius * 9 / 5) + 32;

      fahrenheitInput.value = fahrenheit.toFixed(2);
    });

  
    fahrenheitInput.addEventListener("input", () => {
      const fahrenheit = parseFloat(fahrenheitInput.value);

      if (isNaN(fahrenheit)) {
        celsiusInput.value = "";
        return;
      }

      const celsius = (fahrenheit - 32) * 5 / 9;

      celsiusInput.value = celsius.toFixed(2);
    });
  </script>

</body>
</html>
