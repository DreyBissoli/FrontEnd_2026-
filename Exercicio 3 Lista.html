<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Média Escolar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
      width: 350px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background-color: #555;
    }

    #resultado {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }

    .azul {
      color: blue;
    }

    .verde {
      color: green;
    }

    .vermelho {
      color: red;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Média Escolar</h2>

    <input type="text" id="nome" placeholder="Nome do aluno">

    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <input type="number" id="nota3" placeholder="Nota 3">

    <button id="btnCalcular">Calcular Média</button>

    <div id="resultado"></div>
  </div>

  <script>
    const botao = document.getElementById("btnCalcular");

    botao.addEventListener("click", function () {

      const nome = document.getElementById("nome").value;

 
      const nota1 = Number(document.getElementById("nota1").value);
      const nota2 = Number(document.getElementById("nota2").value);
      const nota3 = Number(document.getElementById("nota3").value);

      const media = (nota1 + nota2 + nota3) / 3;

      const resultado = document.getElementById("resultado");

      if (media >= 7 && media <= 10) {

        resultado.className = "azul";
        resultado.innerHTML = `
          Aluno: ${nome} <br>
          Média: ${media.toFixed(2)} <br>
          Situação: APROVADO
        `;

      } else if (media >= 4 && media < 7) {

        const falta = 10 - media;

        resultado.className = "verde";
        resultado.innerHTML = `
          Aluno: ${nome} <br>
          Média: ${media.toFixed(2)} <br>
          Situação: EXAME <br>
          Faltam ${falta.toFixed(2)} pontos para atingir 10.
        `;

      } else {

        resultado.className = "vermelho";
        resultado.innerHTML = `
          Aluno: ${nome} <br>
          Média: ${media.toFixed(2)} <br>
          Situação: REPROVADO
        `;
      }

    });
  </script>

</body>
</html>
