<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crédito para Festas & Eventos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    select,
    input,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #0056b3;
    }

    .resultado {
      margin-top: 25px;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
    }

    .resultado p {
      margin: 8px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Orçamento de Evento</h1>

    <label for="pacote">Escolha o Pacote:</label>
    <select id="pacote">
      <option value="50">Standard - R$ 50,00</option>
      <option value="80">Premium - R$ 80,00</option>
      <option value="120">Infinity Deluxe - R$ 120,00</option>
    </select>

    <label for="pessoas">Quantidade de Pessoas:</label>
    <input type="number" id="pessoas" min="1" placeholder="Digite a quantidade">

    <button onclick="calcularOrcamento()">
      Calcular Orçamento
    </button>

    <div class="resultado" id="resultado">
      <p>Custo Bruto: R$ 0,00</p>
      <p>Taxa de Serviço: R$ 0,00</p>
      <p>Desconto: R$ 0,00</p>
      <p><strong>Total Final: R$ 0,00</strong></p>
    </div>
  </div>

  <script>
    function calcularOrcamento() {

      // Captura dos valores
      let valorPacote = Number(document.getElementById("pacote").value);
      let quantidade = Number(document.getElementById("pessoas").value);

      // Cálculo base
      let custoBruto = valorPacote * quantidade;

      // Taxa de serviço (10%)
      let taxaServico = custoBruto * 0.10;

      // Total com taxa
      let totalComTaxa = custoBruto + taxaServico;

      // Desconto fidelidade (5%)
      let desconto = 0;

      if (quantidade > 100) {
        desconto = totalComTaxa * 0.05;
      }

      // Total final
      let totalFinal = totalComTaxa - desconto;

      // Exibição
      document.getElementById("resultado").innerHTML = `
        <p><strong>Custo Bruto:</strong> R$ ${custoBruto.toFixed(2)}</p>
        <p><strong>Taxa de Serviço:</strong> R$ ${taxaServico.toFixed(2)}</p>
        <p><strong>Desconto:</strong> R$ ${desconto.toFixed(2)}</p>
        <p><strong>Total Final:</strong> R$ ${totalFinal.toFixed(2)}</p>
      `;
    }
  </script>

</body>
</html>
