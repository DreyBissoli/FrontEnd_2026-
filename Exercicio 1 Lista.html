<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Validador de CPF</title>

  <style>
   body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.todo-app {
    text-align: center;
    max-width: 400px;
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #fff;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

ul {
    list-style-type: none;
    padding: 0;
}

li {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    border-bottom: 1px solid #ccc;
}

li.completed {
    text-decoration: line-through;
}

button {
    margin-top: 10px;
}

.valido {
      color: green;
    }

    .invalido {
      color: red;
      
  </style>
</head>
<body>

  <div class="container">
    <h1>Validador de CPF</h1>

    <input type="text" id="cpf" placeholder="Digite o CPF" maxlength="14">

    <button onclick="validarCPF()">Validar</button>

    <div id="resultado"></div>
  </div>

  <script>
    function validarCPF() {
      const input = document.getElementById("cpf").value;

      // Remove pontos e traços
      const cpf = input.replace(/\D/g, '');

      const resultado = document.getElementById("resultado");

      // Verifica tamanho
      if (cpf.length !== 11) {
        mostrarResultado(false);
        return;
      }

      // Verifica se todos os números são iguais
      if (/^(\d)\1+$/.test(cpf)) {
        mostrarResultado(false);
        return;
      }

      // ===== Primeiro dígito =====
      let soma = 0;

      for (let i = 0; i < 9; i++) {
        soma += parseInt(cpf[i]) * (10 - i);
      }

      let digito1 = (soma * 10) % 11;

      if (digito1 === 10) {
        digito1 = 0;
      }

      // ===== Segundo dígito =====
      soma = 0;

      for (let i = 0; i < 10; i++) {
        soma += parseInt(cpf[i]) * (11 - i);
      }

      let digito2 = (soma * 10) % 11;

      if (digito2 === 10) {
        digito2 = 0;
      }

      // Verificação final
      if (
        digito1 == cpf[9] &&
        digito2 == cpf[10]
      ) {
        mostrarResultado(true);
      } else {
        mostrarResultado(false);
      }
    }

    function mostrarResultado(valido) {
      const resultado = document.getElementById("resultado");

      if (valido) {
        resultado.textContent = "CPF Válido!";
        resultado.className = "valido";
      } else {
        resultado.textContent = "CPF Inválido!";
        resultado.className = "invalido";
      }
      
    }
  </script>

</body>
</html>
